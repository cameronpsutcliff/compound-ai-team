name: Enforce operating kit

"on":
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  gates:
    name: Clean kit gates and self-tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repository gates
        run: ./enforcement/bin/check-kit.sh

      - name: Run self-test harness
        run: ./enforcement/tests/run-selftest.sh

  gate-blocking-demo:
    name: Show gates block planted violations
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Demonstrate blocking behavior
        run: |
          set -euo pipefail
          echo "CI demo: gates correctly block violations when planted fixtures are tested."
          ./enforcement/tests/run-selftest.sh
          echo "CI demo: gates correctly block violations."

  fresh-clone:
    name: Fresh clone simulation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Simulate fresh adopter clone
        run: ./enforcement/bin/simulate-fresh-clone.sh

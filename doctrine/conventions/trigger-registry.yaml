notes: >
  trigger-indexer demoted to CI (check-registry-coherence.sh); its entries removed.
  provenance-check merged into release-captain reference; its triggers absorbed by release-captain.
  Skill-merge (Cameron + Josh): unified `memory` skill (modes capture/compress/preserve/resume/recall)
  absorbs context-loader and pattern-promoter, which are now retired redirect stubs routing to memory.
  Unified `delegation` skill (worker roles + cost-tier routing + autonomy ladder) added, generic;
  the fleet-specific delegation.md is superseded. agent-panel-review gains a phased-review mode.
  One trigger set per merged skill; the SKILL.md sub-routes by intent.
  Registry maintenance procedure: doctrine/skills/request-router/reference/registry-maintenance.md.
